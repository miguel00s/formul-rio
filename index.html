<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>

<style>
    body{
        font-family: sans-serif;
        background-color: #f4f7f6;
        display: flex;
        justify-content: center;
        padding: 20px;
    }
    .form-container{
        background-color: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 10px rgba(0, 0, 0, 1);
        width: 500px;
    }
    table{
        width: 100%;
        border-collapse: collapse;
    }
    td{
        padding: 8px 5px;
        color:  #444;
        font-size: 14px;
    }
    .label-col{
        text-align: right;
        width: 35%;
    }
    input[type="text"], input[type="email"], input[type="password"],
    input[type="number"], input[type="tel"], input[type="url"],
    input[type="date"], input[type="time"], input[type="datetime-local"], select, textarea{
        width: 100%;
        padding: 6px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }

    .buttons{
        text-align: center;
        padding-top: 20px;
    }
    .btn-cadastrar{
        background-color: #edf2f7;
        color: #4a5568;
        border: 1px solid #cbd5e0;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        margin-left: 10px;
    }
    .btn-limpar{
        background-color: #edf2f7;
        color: #4a5568;
        border: 1px solid #cbd5e0;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        margin-left: 10px;
    }
    range{
        color:;
    }
</style>

<body>

    <div class="form-container">

        <h2>Formulário de cadastro</h2>

        <form>
            <table>

                <tr>
                    <td class="label-col">Nome:</td>
                    <td><input type="text" name="nome"></td>
                </tr>

                <tr>
                    <td class="label-col">Email:</td>
                    <td><input type="email" name="email"></td>
                </tr>

                <tr>
                    <td class="label-col">Senha:</td>
                    <td><input type="password" name="senha"></td>
                </tr>

                <tr>
                    <td class="label-col">Idade:</td>
                    <td><input type="number" name="idade" value="0" style="width: 60px;"></td>
                </tr>

                <tr>
                    <td class="label-col">Telefone:</td>
                    <td><input type="tel" name="telefone"></td>
                </tr>

                <tr>
                    <td class="label-col">Site:</td>
                    <td><input type="url" name="site"></td>
                </tr>

                <tr>
                    <td class="label-col">Data de nascimento:</td>
                    <td><input type="date" name="nascimento"></td>
                </tr>

                <tr>
                    <td class="label-col">Hora favorita:</td>
                    <td><input type="time" name="hora" style="width: 100px;"></td>
                </tr>

                <tr>
                    <td class="label-col">Data e hora:</td>
                    <td><input type="datetime-local" name="data_hora"></td>
                </tr>

                <tr>
                    <td class="label-col">Cor favorita:</td>
                    <td><input type="color" name="cor" style="width: 40px; height: 30; border: none; padding: 0;"></td>
                </tr>

                <tr>
                    <td class="label-col">Nível de satisfação</td>
                    <td><input type="range" name="satisfacao" min="0" max="100"></td>
                </tr>

                <tr>
                    <td class="label-col">Interesses:</td>
                    <td>
                        <input type="checkbox" id="futebol"> <label for="futebol">Futebol</label>
                        <input type="checkbox" id="programacao"> <label for="programacao">Programação</label>
                        <input type="checkbox" id="games"> <label for="games">Games</label>
                    </td>
                 </tr>

                <tr>
                    <td class="label-col">Sexo:</td>
                    <td>
                        <select name="sexo" style="width: 120px;">
                            <option>Masculino</option>
                            <option>Feminino</option>
                            <option>Outro</option>
                        </select>
                    </td>
                </tr>

                <tr>
                   <td class="label-col" style="vertical-align: top;">Observações</td>
                   <td><textarea name="obs" rows="4"></textarea></td> 
                </tr>

                <tr>
                    <td  class="label-col">Foto de perfil</td>
                    <td><input type="file" name="foto"></td>
                </tr>

            </table>

            <div class="buttons">
                <button type="submit" class="btn-cadastrar">Cadastrar</button>
                <button type="reset" class="btn-limpar">Limpar</button>
                
            </div>

        </form>
    </div>

</body>

</html>
